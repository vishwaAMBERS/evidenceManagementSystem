<!DOCTYPE html>
<html lang="en">
<head>
    <title>Evidence System</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">User Registration</h2>

        <form id="registerForm">

            <input class="form-control mb-3" type="text" id="name" placeholder="Name">
            <input class="form-control mb-3" type="text" id="username" placeholder="Username">
            <input class="form-control mb-3" type="password" id="password" placeholder="Password">
            <input class="form-control mb-3" type="text" id="role" placeholder="Role">

            <button class="btn btn-primary w-100" type="submit">Register</button>
        </form>

        <p class="text-center mt-3 text-success" id="result"></p>
    </div>
</div>

<script>
    const BASE_URL = "http://localhost:8083";

document.getElementById("registerForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const data = {
        name: document.getElementById("name").value,
        username: document.getElementById("username").value,
        password: document.getElementById("password").value,
        role: document.getElementById("role").value
    };

    fetch(`${BASE_URL}/user/register`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    })
    .then(res => res.text())
    .then(data => {
        document.getElementById("result").innerText = data;

        // ✅ redirect AFTER success
        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 1500);
    });
});

</script>

</body>
</html>
