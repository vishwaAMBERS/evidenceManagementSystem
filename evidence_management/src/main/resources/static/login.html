<!DOCTYPE html>
<html lang="en">
<body>

<h2>Login</h2>

Username: <label for="username"></label><input type="text" id="username"><br><br>
Password: <label for="password"></label><input type="password" id="password"><br><br>

<button onclick="login()">Login</button>

<p id="result"></p>

<script>
    const BASE_URL = "http://localhost:8083";

function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    fetch(`${BASE_URL}/user/login?username=${username}&password=${password}`, {
        method: "POST"
    })
    .then(res => res.text())
    .then(data => {
        document.getElementById("result").innerText = data;

        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 1500);
    });
}

</script>

</body>
</html>
